<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
   <div class="container">
    <div class="weather-input">
    
        <div class="input-group">
            <input type="text" id="userLocation" placeholder="Search for places...">
            <select class="converter" id="converter">
                <option>°C</option>
                <option>°F</option>
            </select>

            <i class="fas fa-search" onclick="findUserLocation()"></i>
        </div>
        <div class="weatherIcon"></div>
        <h2 class="temperature"></h2>
         <div class="feelslike"></div>
         <div class="description"></div>
         <hr>

         <div class="date"></div>
         <div class="city"></div>
    </div>

    <div class="weather-output">
        <h2 class = heading>Today's Highlights</h2>
    <div class="highlights">
        <div class="humidity">
            humidity
            <i class="fas fa-tint"></i>
            <h1 id="Hvalue"></h1>
        </div>

        <div class="wind-speed">
            Wind Speed
            <i class="fas fa-wind"></i>
            <h1 id="Wvalue"></h1>
        </div>

        <div class="sun">
            <span>
                <i class="fas fa-sun"></i>
                <p><span class="SRValue"></span>Sunrise</p>
            </span>
             <span>
                <i class="fas fa-moon"></i>
                <p><span class="SSValue"></span>Sunset</p>
            </span>
        </div>

        <div class="clouds">
            Clouds
            <i class="fas fa-cloud"></i>
            <h1 id="Cvalue"></h1>
        </div>

        <div class="uv-index">
            UV Index
            <i class="fas fa-bacon"></i>
            <h1 id="UVvalue"></h1>
        </div>

        <div class="pressure">
            Pressure
            <i class="fa-solid fa-volcano"></i>
            <h1 id="Pvalue"></h1>
        </div>
  <br>
        <h2 class="heading">This week</h2>
        <div class="forecast"></div>
    </div>
    </div>
   </div>
</body>
 <script src="script.js"></script>
</html>
